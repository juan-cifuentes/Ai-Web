name: Compilar y Desplegar en cPanel

on:
  push:
    branches:
      - main  # Se ejecuta cada vez que haces commit a la rama principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configurar el entorno de Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Instalar dependencias y compilar el sitio de Vite
    - name: Install and Build
      run: |
        npm install
        npm run build

    # 4. Subir la carpeta compilada (dist) a cPanel vía FTP
    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/  # Carpeta generada por Vite que contiene el index.html listo
        server-dir: /public_html/  # Cambia esto si tu sitio está en una subcarpeta
